front:
  text: 太上老君說天妃救苦靈驗經傷十
  hash: sha256:0475875ba7477c796d9ea6e4dad9b4e6c29a31f76d17d614132e818af85a56c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0030_SJB_000-110408b, image: sjb/11/110408b.png}
body:
  text: 仰啓勑封號無極仁慈輔斗至靈神威容顯現大海中徳廣偏施天下仰䕶國救民無壅滯扶危救險在須史或遊天界或人間或徧波濤并地府邪魔鬼魅總歸依魍魎妖精皆潜伏變凶爲吉如彈指賜福消災若殄微凡人有禱捧金爐一切歸心從懇禱至心歸命禮浦沱勝境興化湄州靈應威徳非常孝感神通廣大救厄而平波息浪扶危而起死廻生大慈大悲救苦救難勑封䕶國庇民明著妙靈昭應弘仁普濟天妃啓請呪奉請三天都總管九天遊奕不曽停上聖天妃功護國勑封靈惠衛朝廷頭戴花冠乗鳳輦身披翬服仗龍形東列西華排鬼將南征北討助神兵劔佩斗牛光凛冽簡書勑命掃妖精威容顯現人欽仰心運慈悲雨露均救民護國施恩徳祛害除災利澤興威徳周圓通上界垂慈降世度群生山河社稷永安鎭雨順風調保太平散影分輝遍三界人間天上日月明天龍鬼神咸恭敬奉勑皆令達上清我今誓願永受持一心歸命奉眞經奉禮呪隂徳始生陽光吉貞威容烜赫救度生民斬鬼除魔速達上清三台來護衆聖皆迎戴天履地歩斗魁星無憂不滅無願不成誦持神呪道炁長存爾時太上老君在無極境界觀見大洋溟渤河瀆川源四海九江五湖水澤蛟蜃魚龍岀没變化精妖鬼恠千狀萬端有諸衆生或以興商買賣採寳求珍岀使遐荒交通異域外邦進貢上國頒恩輸運錢粮進納貢賦舟船徃復風水不便潮勢洶湧驚濤倉卒或風雷震撃雨雹滂沱其諸晃神乗此隂陽變化翻覆舟船損人性命橫被傷殺無由解脫以致捉生代死怨怒上衝何由救免於是廣救眞人上白天尊曰斗中有妙行玉女於昔劫以來修諸妙行誓揚正化廣濟衆生普令安樂於是天尊乃命妙行玉女降生人間救民疾苦乃於甲申之歳三月二十三日辰時降生世間生而通靈長而神異精修妙行示大神通救度生民願與一切含靈解厄消災扶難拔苦功圓果滿白日上升土神社主奏上三天於是老君勑下輔斗昭孝純正靈應孚濟䕶國庇民妙靈昭應弘仁普濟天妃於是天妃聽宣法音弘是願言自今以後若有行商坐賈買賣求財或農工伎藝種作經營或行兵布陣或産難不分或官非撓聒或口舌所侵多諸惱害或疾病纒綿無有休息但能起恭敬心稱吾名者我即應時孚感令得所願遂心所謀如意吾常遊行天界徧察人間以致地府泉源江河海上一切去處令諸所求悉皆遂願於是廣救眞人聞是願言稽首歸依而說偈曰勑封輔斗顯跡威靈飛符走印統領天丁收捕奸盜斬滅妖精扶危濟險䕶助天兵邪魔永殄疾病安寧敬順者泰橫逆者傾厭息火盜斷絶邪㝠東西南北四方肅清神威震肅家國咸寧英烈天妃善慶明時遊行三界徧察靈祗風雷衛護兵將維持中臨人世爲殄災非下通地府偏告神司枉橫者戮殺人者誅施人者愛謀人者追一心歸仰萬物咸熈急急如律令爾時天妃聞說偈巳稽首天尊道前而說誓言一者誓救舟船達于彼岸二者誓䕶客商咸令安噤三者祛逐邪祟永得消除四者蕩滅災迍家門清淨五者搜捕奸盜屏跡潜形六者收斬惡人誅鋤强梗七者救民䕶國民稱太平八者釋罪解愆離諸報對九者扶持産難母子安全十者庇䕶良民免遭横逆十一者衛護法界風雨順時十二者凡有歸向保佑安寧十三者修學至人功行果滿十四者求官進職爵禄亨通十五者過去超生九幽息對是時老君聞天妃誓言乃勑玄妙玉女錫以無極輔斗助政普濟天妃之號賜珠冠雲履玉珮寳圭緋衣青綬龍車鳳輦佩劔持印前後導從部衛精嚴黃蜂兵帥白馬將軍丁壬使者檉香大聖晏公大神有千里眼之察奸順風耳之報事青衣童子水部判官佐助威靈顯揚正化世間若有男女恭敬信禮稱其名號或修齋設醮建置道場或清淨家庭或江河水上轉誦是經一徧乃至百徧千徧即得祛除災難殄滅邪魔疾病自痊官災永息行兵臨陣凶惡自離囚獄之中自然清泰賊㓂不侵惡言無害田蚕百倍牛畜孳生財禄盈餘經營獲利行商坐賈採寳求珍海途平善無諸驚恐求官作事遂意稱心是時天尊說是經畢天龍鬼神咸願䕶持於是廣救眞人復說偈曰全闕聖后勑封輔斗天人顯跡嶽瀆毓秀三月建辰下弦應候護國靈長嵩呼萬夀福不臻何難不救與道合眞玉皇眷佑依經轉誦魔靈束首焼香散花修齋設醮應有急難即當䖍告如法受持無不應驗急急如律令眞后斗仙位列九天上佐金闕下及泉源七元使者道合自然人間皈仰福報無邊異天罔極降福綿延英烈天妃應感無方人間天上咸敬其名貞風顯佑國土清平臣今遵奉永保利貞是時廣救說是偈巳妙行天妃稽首天尊奉辭而退三界靈衹天龍神鬼咸生歡喜信受奉行天妃救苦靈符勑符呪曰輔斗眞人感應化生一符一水救濟萬民除災去障永保安寧急急如律令齊天聖后北斗降身三界顯跡巨海通靈神通變化順濟稱名三十二相相貌端成隨念隨應至聖至靈威光顯赫護國庇民海風吹浪至祝降臨一心瞻仰顯現眞身虛空岀現統領天兵威神下降鬼伏神驚莆田土主聖化竹林北斗大聖驅逐邪精消災散禍家國安寧急急如律令右天妃靈符如有急告焚香念前呪七遍書此符用井花水磨乳香調服自然安好無不應驗太上老君說天妃救苦靈驗妙經
