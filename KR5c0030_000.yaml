front:
  text: 太上老君説天妃救苦靈驗經傷十
  hash: sha256:6be52cf48b7b241b04c9673697229093ed895fdc1a4e0d85f2626bcdad752757
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0030_HFL_000-001a, image: hfl/0342/0342-170.png}
body:
  text: 仰啓勑封號無極仁慈輔斗至靈神威容顯現大海中德廣偏施天下仰護國救民無壅滯扶危救險在須史或遊天界或人間或遍波濤并地府邪魔鬼魅總歸依魍魎妖精皆潛伏變凶為吉如彈指賜福消災若殄微凡人有禱捧金爐一切歸心從懇禱至心歸命禮浦沱勝境興化湄州靈應威德非常孝感神通廣大救厄而平波息浪扶危而起死回生大慈大悲救苦救難勑封護國庇民明著妙靈昭應弘仁普濟天妃啓請呪奉請三天都總管九天遊奕不曽停上聖天妃功護國勑封靈惠衛朝廷頭戴花冠乘鳳輦身披翬服仗龍形東列西華排鬼將南征北討助神兵劔佩斗牛光凛冽簡書勑命掃妖精威容顯現人欽仰心運慈悲雨露均救民護國施恩德祛害除災利澤興威德周圓通上界垂慈降世度群生山河社稷永安鎮雨順風調保太平散影分輝遍三界人間天上日月明天龍鬼神咸恭敬奉勑皆令達上清我今誓願永受持一心歸命奉真經奉禮呪隂德始生陽光吉貞威容烜赫救度生民斬鬼除魔速達上清三台來護衆聖皆迎戴天履地步斗魁星無憂不滅無願不成誦持神呪道氣長存爾時太上老君在無極境界觀見大洋溟渤河瀆川源四海九江五湖水澤蛟蜃魚龍出沒變化精妖鬼怪千狀萬端有諸衆生或以興商買賣採寶求珍出使遐荒交通異域外邦進貢上國頒恩輸運錢糧進納貢賦舟船往復風水不便潮勢洶湧驚濤倉卒或風雷震擊雨雹滂沱其諸晃神乘此隂陽變化翻覆舟船損人性命橫被傷殺無由解脫以致捉生代死怨怒上衝何由救免於是廣救真人上白天尊曰斗中有妙行玉女於昔劫以來修諸妙行誓揚正化廣濟衆生普令安樂於是天尊乃命妙行玉女降生人間救民疾苦乃於甲申之歲三月二十三日辰時降生世間生而通靈長而神異精修妙行示大神通救度生民願與一切含靈解厄消災扶難拔苦功圓果滿白日上升土神社主奏上三天於是老君勑下輔斗昭孝純正靈應孚濟護國庇民妙靈昭應弘仁普濟天妃於是天妃聽宣法音弘是願言自今以後若有行商坐賈買賣求財或農工伎藝種作經營或行兵布陳或産難不分或官非撓聒或口舌所侵多諸惱害或疾病纒綿無有休息但能起恭敬心稱吾名者我即應時孚感令得所願遂心所謀如意吾常遊行天界遍察人間以致地府泉源江河海上一切去處令諸所求悉皆遂願於是廣救真人聞是願言稽首歸依而説偈曰勑封輔斗顯迹威靈飛符走印統領天丁收捕姦盜斬滅妖精扶危濟險護助天兵邪魔永殄疾病安寧敬順者泰橫逆者傾厭息火盜斷絶邪冥東西南北四方肅清神威震肅家國咸寧英烈天妃善慶明時遊行三界遍察靈祗風雷衛護兵將維持中臨人世為殄災非下通地府偏告神司枉橫者戮殺人者誅施人者愛謀人者追一心歸仰萬物咸熙急急如律令爾時天妃聞説偈巳稽首天尊道前而説誓言一者誓救舟船達于彼岸二者誓護客商咸令安噤三者祛逐邪祟永得消除四者蕩滅災迍家門清淨五者搜捕姦盜屏迹潛形六者收斬惡人誅鋤強梗七者救民護國民稱太平八者釋罪解愆離諸報對九者扶持産難母子安全十者庇護良民免遭橫逆十一者衛護法界風雨順時十二者凡有歸向保佑安寧十三者修學至人功行果滿十四者求官進職爵祿亨通十五者過去超生九幽息對是時老君聞天妃誓言乃勑玄妙玉女錫以無極輔斗助政普濟天妃之號賜珠冠雲履玉珮寶圭緋衣青綬龍車鳳輦佩劔持印前後導從部衛精嚴黃蜂兵帥白馬將軍丁壬使者柳香大聖晏公大神有千里眼之察姦順風耳之報事青衣童子水部判官佐助威靈顯揚正化世間若有男女恭敬信禮稱其名號或修齋設醮建置道場或清淨家庭或江河水上轉誦是經一遍乃至百遍千遍即得祛除災難殄滅邪魔疾病自痊官災永息行兵臨陳凶惡自離囚獄之中自然清泰賊寇不侵惡言無害田蠶百倍牛畜孳生財祿盈餘經營獲利行商坐賈採寶求珍海途平善無諸驚恐求官作事遂意稱心是時天尊説是經畢天龍鬼神咸願護持於是廣救真人復説偈曰全闕聖后勑封輔斗天人顯迹嶽瀆育秀三月建辰下弦應候護國靈長嵩呼萬夀福不臻何難不救與道合真玉皇眷佑依經轉誦魔靈束首燒香散花修齋設醮應有急難即當虔告如法受持無不應驗急急如律令真后斗仙位列九天上佐金闕下及泉源七元使者道合自然人間皈仰福報無邊異天罔極降福綿延英烈天妃應感無方人間天上咸敬其名貞風顯佑國土清平臣今遵奉永保利貞是時廣救説是偈巳妙行天妃稽首天尊奉辭而退三界靈只天龍神鬼咸生歡喜信受奉行天妃救苦靈符勑符呪曰輔斗真人感應化生一符一水救濟萬民除災去障永保安寧急急如律令齊天聖后北斗降身三界顯迹巨海通靈神通變化順濟稱名三十二相相貌端成隨念隨應至聖至靈威光顯赫護國庇民海風吹浪至祝降臨一心瞻仰顯現真身虛空出現統領天兵威神下降鬼伏神驚莆田土主聖化竹林北斗大聖驅逐邪精消災散禍家國安寧急急如律令右天妃靈符如有急告焚香念前呪七遍書此符用井花水磨乳香調服自然安好無不應驗太上老君説天妃救苦靈驗妙經
